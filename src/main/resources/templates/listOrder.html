<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Order List</title></head>
<body>
<h1>Orders by Author</h1>
<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>Author</th>
        <th>Status</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="order : ${orders}">
        <td th:text="${order.id}"></td>
        <td th:text="${order.author}"></td>
        <td th:text="${order.status}"></td>
    </tr>
    </tbody>
</table>
<a href="/order/history">Back to Search</a>
</body>
</html>
