<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Payment Detail</title></head>
<body>
<h1>Payment Detail</h1>
<div th:if="${payment}">
    <p>Payment ID: <span th:text="${payment.id}"></span></p>
    <p>Status: <span th:text="${payment.status}"></span></p>
</div>
</body>
</html>
